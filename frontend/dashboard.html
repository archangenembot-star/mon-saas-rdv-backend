<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - SaaS Appointment</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --background: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 🧭 Barre de Navigation Mise à jour et Harmonisée */
        .navbar {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-item {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-item.active, .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        .user-info {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .lang-select {
            background: rgba(255, 255, 255, 0.07); 
            border: 1px solid var(--border-glass);
            color: white; 
            padding: 8px 12px; 
            border-radius: 8px; 
            font-size: 13px; 
            outline: none; 
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* 🔗 Section Générateur de Lien */
        .link-generator-card {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-title {
            font-size: 15px;
            font-weight: 700;
            color: #a5b4fc;
        }

        .link-container {
            display: flex;
            gap: 10px;
        }

        .link-input {
            flex: 1;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 10px 14px;
            color: #cbd5e1;
            font-size: 14px;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-copy {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-copy:hover {
            background: var(--primary-hover);
        }

        /* Dashboard Table Card */
        .dashboard-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 600px;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            padding: 16px;
            border-bottom: 1px solid var(--border-glass);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 15px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-confirmed {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-cancelled {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-action {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #6ee7b7;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: rgba(16, 185, 129, 0.4);
        }

        .btn-reject {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            margin-left: 8px;
            transition: 0.2s;
        }

        .btn-reject:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 12px;
            transition: 0.2s;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
            border-color: #ef4444;
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-style: italic;
            display: none;
        }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
        }

        .toast {
            background: rgba(30, 27, 75, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #ef4444; }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">📅 SaaS Appointment</div>
    <div class="nav-links">
        <a href="home.html" class="nav-item" id="navHome">Home</a>
        <a href="dashboard.html" class="nav-item active" id="navDashboard">Dashboard</a>
        <a href="user-center.html" class="nav-item" id="navProfile">Profile</a>
    </div>
</nav>

<div id="toastContainer" class="toast-container"></div>

<div class="container">
    <div class="header">
        <div>
            <h1 id="dashTitle">Tableau de bord</h1>
            <div class="user-info" id="userDisplay">Connecté en tant que : ...</div>
        </div>
        <div class="header-actions">
            <select id="langSelect" class="lang-select">
                <option value="fr">🇫🇷 FR</option>
                <option value="en">🇺🇸 EN</option>
            </select>
            <button class="btn-logout" id="logoutBtn">Déconnexion</button>
        </div>
    </div>

    <div class="link-generator-card">
        <div class="link-title" id="lblBookingLink">Mon lien de réservation client :</div>
        <div class="link-container">
            <input type="text" id="bookingUrlField" class="link-input" readonly value="Génération du lien...">
            <button class="btn-copy" id="btnCopyLink" onclick="copyBookingLink()">Copier</button>
        </div>
    </div>

    <div class="dashboard-card">
        <table>
            <thead>
                <tr>
                    <th id="thClient">Client</th>
                    <th id="thEmail">E-mail</th>
                    <th id="thDate">Date & Heure</th>
                    <th id="thStatus">Statut</th>
                    <th id="thAction">Action</th>
                </tr>
            </thead>
            <tbody id="appointmentsTableBody"></tbody>
        </table>
        <div class="no-data" id="noDataMessage">Aucune demande de rendez-vous pour le moment.</div>
    </div>
</div>

<script>
    // ⚠️ METS ICI TON URL DE PRODUCTION RAILWAY (ex: 'https://mon-projet-production.up.railway.app')
    const BASE_URL = 'https://mon-saas-rdv-backend-production.up.railway.app';

    const sessionData = localStorage.getItem('saas_user') || localStorage.getItem('userId');
    if (!sessionData) {
        window.location.replace('login.html');
    }

    let userId = localStorage.getItem('userId');
    let userEmail = localStorage.getItem('userEmail') || '...';

    if (sessionData && !userId) {
        try {
            const parsed = JSON.parse(sessionData);
            userId = parsed.id || parsed.userId;
            userEmail = parsed.email || userEmail;
        } catch(e) {}
    }

    let currentLang = localStorage.getItem('saasLang') || 'fr';

    const translations = {
        fr: {
            title: "Tableau de bord",
            connected: "Connecté en tant que : ",
            logout: "Déconnexion",
            thClient: "Client",
            thEmail: "E-mail",
            thDate: "Date & Heure",
            thStatus: "Statut",
            thAction: "Action",
            noData: "Aucune demande de rendez-vous pour le moment.",
            statusPending: "En attente",
            statusConfirmed: "Confirmé",
            statusCancelled: "Annulé",
            btnAccept: "✓ Accepter",
            btnReject: "✕ Refuser",
            savedAction: "Pris en compte",
            rejectedAction: "Refusé",
            confirmDelete: "Voulez-vous vraiment supprimer ce rendez-vous ?",
            successAccept: "Rendez-vous validé et e-mail envoyé !",
            successReject: "Rendez-vous refusé et e-mail envoyé !",
            successDelete: "Rendez-vous supprimé avec succès !",
            errLoad: "Impossible de charger les rendez-vous.",
            errUpdate: "Erreur lors de la mise à jour.",
            errDelete: "Erreur lors de la suppression.",
            errServer: "Erreur de connexion avec le serveur.",
            lblBookingLink: "Mon lien de réservation client :",
            btnCopy: "Copier",
            btnCopied: "Copié !",
            successCopy: "Lien copié dans le presse-papier !"
        },
        en: {
            title: "Dashboard",
            connected: "Logged in as: ",
            logout: "Logout",
            thClient: "Client",
            thEmail: "Email",
            thDate: "Date & Time",
            thStatus: "Status",
            thAction: "Action",
            noData: "No appointment requests at the moment.",
            statusPending: "Pending",
            statusConfirmed: "Confirmed",
            statusCancelled: "Cancelled",
            btnAccept: "✓ Accept",
            btnReject: "✕ Reject",
            savedAction: "Processed",
            rejectedAction: "Rejected",
            confirmDelete: "Are you sure you want to delete this appointment?",
            successAccept: "Appointment approved and email sent!",
            successReject: "Appointment rejected and email sent!",
            successDelete: "Appointment successfully deleted!",
            errLoad: "Unable to load appointments.",
            errUpdate: "Error during update.",
            errDelete: "Error during deletion.",
            errServer: "Server connection error.",
            lblBookingLink: "My client booking link:",
            btnCopy: "Copy",
            btnCopied: "Copied!",
            successCopy: "Link copied to clipboard!"
        }
    };

    function applyTranslations() {
        const t = translations[currentLang];
        document.getElementById('dashTitle').innerText = t.title;
        document.getElementById('userDisplay').innerText = `${t.connected}${userEmail}`;
        document.getElementById('logoutBtn').innerText = t.logout;
        document.getElementById('thClient').innerText = t.thClient;
        document.getElementById('thEmail').innerText = t.thEmail;
        document.getElementById('thDate').innerText = t.thDate;
        document.getElementById('thStatus').innerText = t.thStatus;
        document.getElementById('thAction').innerText = t.thAction;
        document.getElementById('noDataMessage').innerText = t.noData;
        document.getElementById('lblBookingLink').innerText = t.lblBookingLink;
        document.getElementById('btnCopyLink').innerText = t.btnCopy;
        document.getElementById('langSelect').value = currentLang;
    }

    // Ici la fonction a été corrigée pour inclure le chemin complet GitHub Pages
    function generateBookingUrl() {
        if (userId) {
            const currentOrigin = window.location.origin;
            document.getElementById('bookingUrlField').value = `${currentOrigin}/mon-saas-rdv-backend/frontend/booking.html?user=${userId}`;
        }
    }

    window.copyBookingLink = function() {
        const t = translations[currentLang];
        const copyText = document.getElementById('bookingUrlField');
        
        navigator.clipboard.writeText(copyText.value).then(() => {
            showToast(t.successCopy, "success");
            const btn = document.getElementById('btnCopyLink');
            btn.innerText = t.btnCopied;
            btn.style.background = "#10b981";
            
            setTimeout(() => {
                btn.innerText = t.btnCopy;
                btn.style.background = "var(--primary)";
            }, 2000);
        }).catch(err => {
            console.error('Erreur de copie: ', err);
        });
    }

    document.getElementById('langSelect').addEventListener('change', (e) => {
        currentLang = e.target.value;
        localStorage.setItem('saasLang', currentLang);
        applyTranslations();
        fetchAppointments();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        sessionStorage.clear();
        window.location.replace('login.html');
    });

    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        const icon = type === 'success' ? '✅' : '❌';
        toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;

        container.appendChild(toast);
        setTimeout(() => { toast.classList.add('show'); }, 100);

        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => { toast.remove(); }, 400);
        }, 4000);
    }

    async function fetchAppointments() {
        const t = translations[currentLang];
        try {
            const res = await fetch(`${BASE_URL}/api/appointments?userId=${userId}`);
            if (!res.ok) throw new Error("Server Error");
            const appointments = await res.json();
            
            const tbody = document.getElementById('appointmentsTableBody');
            const noData = document.getElementById('noDataMessage');
            tbody.innerHTML = '';

            if (!appointments || appointments.length === 0) {
                noData.style.display = 'block';
                return;
            }
            noData.style.display = 'none';

            appointments.reverse().forEach(appt => {
                const tr = document.createElement('tr');
                
                const dateFormatted = new Date(appt.dateTime).toLocaleString(currentLang === 'fr' ? 'fr-FR' : 'en-US', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                let badgeClass = 'badge-pending';
                let statusText = t.statusPending;
                if (appt.status === 'Confirmed') {
                    badgeClass = 'badge-confirmed';
                    statusText = t.statusConfirmed;
                } else if (appt.status === 'Cancelled') {
                    badgeClass = 'badge-cancelled';
                    statusText = t.statusCancelled;
                }

                let actionContent = '';
                if (appt.status === 'Pending') {
                    actionContent = `
                        <button class="btn-action" onclick="updateStatus('${appt.id}', 'Confirmed')">${t.btnAccept}</button>
                        <button class="btn-reject" onclick="updateStatus('${appt.id}', 'Cancelled')">${t.btnReject}</button>
                    `;
                } else if (appt.status === 'Confirmed') {
                    actionContent = `<span style="color: var(--success); font-size: 12px; font-weight:600;">${t.savedAction}</span>`;
                } else {
                    actionContent = `<span style="color: #ef4444; font-size: 12px; font-weight:600;">${t.rejectedAction}</span>`;
                }

                const deleteButton = `<button class="btn-delete" onclick="deleteAppointment('${appt.id}')" title="Delete">🗑️</button>`;

                tr.innerHTML = `
                    <td style="font-weight: 600;">${appt.clientName}</td>
                    <td style="color: var(--text-muted);">${appt.clientEmail || '-'}</td>
                    <td>${dateFormatted}</td>
                    <td><span class="badge ${badgeClass}">${statusText}</span></td>
                    <td>
                        <div style="display: flex; align-items: center;">
                            ${actionContent}
                            ${deleteButton}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (err) {
            console.error("Fetch error:", err);
            showToast(t.errLoad, "error");
        }
    }

    window.updateStatus = async function(id, newStatus) {
        const t = translations[currentLang];
        try {
            const res = await fetch(`${BASE_URL}/api/appointments/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus, lang: currentLang })
            });

            if (res.ok) {
                const msg = newStatus === 'Confirmed' ? t.successAccept : t.successReject;
                showToast(msg, "success");
                fetchAppointments(); 
            } else {
                showToast(t.errUpdate, "error");
            }
        } catch (err) {
            console.error("Update error:", err);
            showToast(t.errServer, "error");
        }
    }

    window.deleteAppointment = async function(id) {
        const t = translations[currentLang];
        if (!confirm(t.confirmDelete)) return;

        try {
            const res = await fetch(`${BASE_URL}/api/appointments/${id}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                showToast(t.successDelete, "success");
                fetchAppointments(); 
            } else {
                showToast(t.errDelete, "error");
            }
        } catch (err) {
            console.error("Delete error:", err);
            showToast(t.errServer, "error");
        }
    }

    applyTranslations();
    generateBookingUrl();
    fetchAppointments();
</script>
</body>
</html>
