<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Appointment - Réserver un RDV</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            margin: 0; padding: 0; color: var(--text-main);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .booking-card {
            background: var(--bg-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass); padding: 40px; border-radius: 20px;
            width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            box-sizing: border-box; position: relative;
        }

        .lang-container { position: absolute; top: 15px; right: 15px; }
        .lang-select {
            background: rgba(255, 255, 255, 0.07); border: 1px solid var(--border-glass);
            color: white; padding: 4px 8px; border-radius: 8px; font-size: 11px; outline: none; cursor: pointer;
        }

        h2 { text-align: center; margin-top: 0; margin-bottom: 10px; font-size: 26px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 30px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #cbd5e1; }
        input {
            width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; color: white; font-size: 14px; outline: none; box-sizing: border-box; transition: all 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25); }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .btn-submit {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary) 0%, #4338ca 100%);
            color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); margin-top: 10px;
        }
        .btn-submit:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .message { padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 20px; display: none; }
        .message-success { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .message-error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }

        /* --- SYSTÈME DE TOASTS ANIMÉS --- */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
        }

        .toast {
            background: rgba(30, 27, 75, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #ef4444; }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div class="booking-card">
    <div class="lang-container">
        <select id="langSelect" class="lang-select">
            <option value="fr">🇫🇷 FR</option>
            <option value="en">🇺🇸 EN</option>
        </select>
    </div>

    <h2 id="mainTitle">Prendre RDV</h2>
    <p class="subtitle" id="mainSubtitle">Choisissez une date et un horaire pour réserver votre créneau directement sur notre calendrier.</p>

    <div id="msgBox" class="message"></div>

    <form id="publicBookingForm">
        <div class="form-group">
            <label for="clientName" id="lblClientName">Votre Nom Complet :</label>
            <input type="text" id="clientName" required placeholder="Ex: Jean Dupont">
        </div>
        <div class="form-group">
            <label for="clientEmail" id="lblClientEmail">Votre Adresse E-mail :</label>
            <input type="email" id="clientEmail" required placeholder="Ex: jean.dupont@email.com">
        </div>
        <div class="form-group">
            <label for="dateTime" id="lblDateTime">Date & Heure souhaitées :</label>
            <input type="datetime-local" id="dateTime" required>
        </div>
        <button type="submit" class="btn-submit" id="btnSubmit">Confirmer la réservation</button>
    </form>
</div>

<script>
    // 🎯 CORRECTION : Utilisation d'un chemin relatif local puisque tout est regroupé sur Railway
   const BASE_URL = 'https://mon-saas-rdv-backend-production.up.railway.app';

    const translations = {
        fr: {
            title: "Prendre RDV",
            subtitle: "Choisissez une date et un horaire pour réserver votre créneau directement sur notre calendrier.",
            lblClientName: "Votre Nom Complet :",
            lblClientEmail: "Votre Adresse E-mail :",
            lblDateTime: "Date & Heure souhaitées :",
            placeholderName: "Ex: Jean Dupont",
            placeholderEmail: "Ex: jean.dupont@email.com",
            btnSubmit: "Confirmer la réservation",
            msgSuccess: "Votre rendez-vous a été enregistré avec succès !",
            msgError: "Impossible d'enregistrer le rendez-vous. Veuillez réessayer.",
            msgNoUser: "Lien invalide. Aucun identifiant de commerçant détecté.",
            msgPastDate: "Vous ne pouvez pas choisir une date ou une heure passée."
        },
        en: {
            title: "Book an Appointment",
            subtitle: "Choose a date and time to book your slot directly on our calendar.",
            lblClientName: "Your Full Name:",
            lblClientEmail: "Your Email Address:",
            lblDateTime: "Desired Date & Time:",
            placeholderName: "e.g. John Doe",
            placeholderEmail: "e.g. john.doe@email.com",
            btnSubmit: "Confirm Booking",
            msgSuccess: "Your appointment has been successfully registered!",
            msgError: "Unable to save appointment. Please try again.",
            msgNoUser: "Invalid link. No merchant ID detected.",
            msgPastDate: "You cannot choose a past date or time."
        }
    };

    let currentLang = localStorage.getItem('saasLang') || 'fr';
    let businessName = "";

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('user'); 
    const msgBox = document.getElementById('msgBox');

    // Récupération dynamique du nom de l'établissement depuis l'API locale
    async function loadBusinessProfile() {
        if (!userId) return;
        try {
            const res = await fetch(`${BASE_URL}/api/user/profile?userId=${userId}`);
            if (res.ok) {
                const data = await res.json();
                businessName = data.businessName || "";
                applyTranslations();
            }
        } catch (err) {
            console.error("Erreur lors du chargement du profil commerce:", err);
        }
    }

    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        const icon = type === 'success' ? '✅' : '❌';
        toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;

        container.appendChild(toast);

        setTimeout(() => { toast.classList.add('show'); }, 100);

        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => { toast.remove(); }, 400);
        }, 4000);
    }

    function applyTranslations() {
        const t = translations[currentLang];
        
        // Utilise le nom de l'établissement si disponible, sinon le titre générique
        document.getElementById('mainTitle').innerText = businessName ? businessName : t.title;
        
        document.getElementById('mainSubtitle').innerText = t.subtitle;
        document.getElementById('lblClientName').innerText = t.lblClientName;
        document.getElementById('lblClientEmail').innerText = t.lblClientEmail;
        document.getElementById('lblDateTime').innerText = t.lblDateTime;
        document.getElementById('clientName').placeholder = t.placeholderName;
        document.getElementById('clientEmail').placeholder = t.placeholderEmail;
        document.getElementById('btnSubmit').innerText = t.btnSubmit;
        document.getElementById('langSelect').value = currentLang;
    }

    function setMinimumDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        const minDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
        document.getElementById('dateTime').min = minDateTime;
    }

    document.getElementById('langSelect').addEventListener('change', (e) => {
        currentLang = e.target.value;
        localStorage.setItem('saasLang', currentLang);
        applyTranslations();
    });

    function showMessage(text, isError = false) {
        msgBox.innerText = (isError ? "🛑 " : "✓ ") + text;
        msgBox.className = isError ? "message message-error" : "message message-success";
        msgBox.style.display = "block";
    }

    // Initialisation
    applyTranslations();
    setMinimumDateTime();
    loadBusinessProfile();

    if (!userId) {
        showMessage(translations[currentLang].msgNoUser, true);
        showToast(translations[currentLang].msgNoUser, "error");
        document.getElementById('publicBookingForm').style.opacity = "0.3";
        document.getElementById('btnSubmit').disabled = true;
    }

    document.getElementById('publicBookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const t = translations[currentLang];
        if (!userId) return;

        const clientName = document.getElementById('clientName').value;
        const clientEmail = document.getElementById('clientEmail').value;
        const dateTime = document.getElementById('dateTime').value;

        if (new Date(dateTime) < new Date()) {
            showMessage(t.msgPastDate, true);
            showToast(t.msgPastDate, "error");
            return;
        }

        try {
            const res = await fetch(`${BASE_URL}/api/public/book`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, clientName, clientEmail, dateTime, lang: currentLang })
            });

            if (res.ok) {
                showMessage(t.msgSuccess, false);
                showToast(t.msgSuccess, "success");
                document.getElementById('publicBookingForm').reset();
                setMinimumDateTime();
            } else {
                showMessage(t.msgError, true);
                showToast(t.msgError, "error");
            }
        } catch (err) {
            showMessage(t.msgError, true);
            showToast(t.msgError, "error");
        }
    });
</script>
</body>
</html>
